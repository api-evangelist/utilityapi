naftiko: 1.0.0-alpha2
info:
  label: UtilityAPI — Templates
  description: 'UtilityAPI — Templates. 2 operations. Lead operation: List Templates. Self-contained Naftiko capability covering
    one Utilityapi business surface.'
  tags:
  - Utilityapi
  - Templates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UTILITYAPI_API_KEY: UTILITYAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: utilityapi-templates
    baseUri: https://utilityapi.com/api/v2
    description: UtilityAPI — Templates business capability. Self-contained, no shared references.
    resources:
    - name: templates
      path: /templates
      operations:
      - name: listtemplates
        method: GET
        description: List Templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of templates to return
        - name: next
          in: query
          type: string
          description: Cursor for pagination
    - name: templates-uid
      path: /templates/{uid}
      operations:
      - name: gettemplate
        method: GET
        description: Get Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UTILITYAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: utilityapi-templates-rest
    port: 8080
    description: REST adapter for UtilityAPI — Templates. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/templates
      name: templates
      description: REST surface for templates.
      operations:
      - method: GET
        name: listtemplates
        description: List Templates
        call: utilityapi-templates.listtemplates
        with:
          limit: rest.limit
          next: rest.next
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/templates/{uid}
      name: templates-uid
      description: REST surface for templates-uid.
      operations:
      - method: GET
        name: gettemplate
        description: Get Template
        call: utilityapi-templates.gettemplate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: utilityapi-templates-mcp
    port: 9090
    transport: http
    description: MCP adapter for UtilityAPI — Templates. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-templates
      description: List Templates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: utilityapi-templates.listtemplates
      with:
        limit: tools.limit
        next: tools.next
      outputParameters:
      - type: object
        mapping: $.
    - name: get-template
      description: Get Template
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: utilityapi-templates.gettemplate
      outputParameters:
      - type: object
        mapping: $.
