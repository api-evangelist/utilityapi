naftiko: 1.0.0-alpha2
info:
  label: UtilityAPI — Events
  description: 'UtilityAPI — Events. 3 operations. Lead operation: List Events. Self-contained Naftiko capability covering
    one Utilityapi business surface.'
  tags:
  - Utilityapi
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UTILITYAPI_API_KEY: UTILITYAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: utilityapi-events
    baseUri: https://utilityapi.com/api/v2
    description: UtilityAPI — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: listevents
        method: GET
        description: List Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: next
          in: query
          type: string
        - name: type
          in: query
          type: string
          description: Filter by event type
    - name: events-uid
      path: /events/{uid}
      operations:
      - name: getevent
        method: GET
        description: Get Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: modifyevent
        method: PUT
        description: Modify Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UTILITYAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: utilityapi-events-rest
    port: 8080
    description: REST adapter for UtilityAPI — Events. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: GET
        name: listevents
        description: List Events
        call: utilityapi-events.listevents
        with:
          limit: rest.limit
          next: rest.next
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{uid}
      name: events-uid
      description: REST surface for events-uid.
      operations:
      - method: GET
        name: getevent
        description: Get Event
        call: utilityapi-events.getevent
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: modifyevent
        description: Modify Event
        call: utilityapi-events.modifyevent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: utilityapi-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for UtilityAPI — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-events
      description: List Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: utilityapi-events.listevents
      with:
        limit: tools.limit
        next: tools.next
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event
      description: Get Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: utilityapi-events.getevent
      outputParameters:
      - type: object
        mapping: $.
    - name: modify-event
      description: Modify Event
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: utilityapi-events.modifyevent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
