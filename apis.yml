aid: utilityapi
name: UtilityAPI
description: >-
  UtilityAPI collects, standardizes, and shares utility data seamlessly and securely, providing a platform for accessing
  energy and utility billing data, meter intervals, and authorization workflows for energy companies, cleantech firms,
  and developers.
type: Index
position: Consumer
access: 3rd-Party
